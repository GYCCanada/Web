name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read #  to fetch code (actions/checkout)

jobs:
  build:
    timeout-minutes: 20

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # effect-tsgo patch runs via the `prepare` lifecycle script on install.
      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

  docker:
    timeout-minutes: 20

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t gycc:ci .

      # Production boot fail-fasts without MAIL_* (ADR 0004); dummies let the
      # container boot — nothing sends mail during the smoke.
      - name: Boot + smoke (/healthz, /, /fr)
        run: |
          docker run -d --name gycc -p 3000:3000 \
            -e MAIL_HOST=smtp.example.com -e MAIL_PORT=587 \
            -e MAIL_USER=ci -e MAIL_PASS=ci \
            -e MAIL_FROM=ci@example.com -e MAIL_TO=ci@example.com \
            gycc:ci
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000/healthz && break
            sleep 1
          done
          curl -sf http://localhost:3000/healthz
          curl -sf -o /dev/null http://localhost:3000/
          curl -sf -o /dev/null http://localhost:3000/fr
          curl -sf -o /dev/null http://localhost:3000/2026/form

      - name: Container logs
        if: always()
        run: docker logs gycc || true
